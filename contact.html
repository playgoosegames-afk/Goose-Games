<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Contact the Goose Games team.">
  <link rel="stylesheet" href="styles.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C5Q5ZQ2DBZ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-C5Q5ZQ2DBZ');</script>
</head>
<body>
<header>
  <a href="/" class="logo">🦆 Goose Games</a>
  <nav>
    <a href="/">Games</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="submit-game.html">Submit a Game</a>
  </nav>
</header>
<main>
  <div class="static-page">
    <h1>Contact Us 🦆</h1>
    <p class="subtitle">Got a question? We'd love to hear from you!</p>

    <form name="contact" method="POST" data-netlify="true" action="contact-success.html">
      <input type="hidden" name="form-name" value="contact">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required placeholder="Gus the Goose">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="gus@example.com">
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option>General Question</option>
          <option>Game Suggestion</option>
          <option>Bug Report</option>
          <option>Partnership</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Tell us what's on your mind..."></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message 🦆</button>
    </form>
  </div>
</main>
<footer>
  <div class="footer-links">
    <a href="about.html">About</a>

</footer>
</body>
</html>
