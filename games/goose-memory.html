<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOOSE MEMORY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Paytone+One&family=Quicksand:wght@500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:linear-gradient(135deg,#e0f7fa 0%,#b2ebf2 50%,#e8f5e9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Quicksand',sans-serif}
  #app{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px}
  h1{font-family:'Paytone One',cursive;font-size:40px;color:#00695c;letter-spacing:2px;text-shadow:2px 3px 0 #a5d6a7}
  h1 small{display:block;font-family:'Quicksand',sans-serif;font-size:12px;color:#4db6ac;letter-spacing:3px;font-weight:700;text-align:center}
  #stats{display:flex;gap:16px}
  .stat{background:#fff;border-radius:12px;padding:8px 18px;text-align:center;box-shadow:0 4px 12px rgba(0,150,136,0.12)}
  .stat-l{font-size:10px;color:#b2bec3;letter-spacing:2px;text-transform:uppercase}
  .stat-v{font-family:'Paytone One',cursive;font-size:26px;color:#00695c}
  .stat-v.time{color:#ff7043}
  #board{display:grid;grid-template-columns:repeat(4,80px);gap:10px}
  .card{width:80px;height:80px;cursor:pointer;perspective:600px;position:relative}
  .card-inner{width:100%;height:100%;transition:transform 0.4s;transform-style:preserve-3d;position:relative}
  .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
  .card-front,.card-back{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:36px}
  .card-back{background:linear-gradient(135deg,#26a69a,#00695c);box-shadow:0 4px 12px rgba(0,150,136,0.25);transform:rotateY(180deg)}
  .card-front{background:linear-gradient(135deg,#80deea,#4dd0e1);box-shadow:0 4px 12px rgba(0,188,212,0.2)}
  .card:hover:not(.flipped):not(.matched) .card-front{filter:brightness(1.12);transform:scale(1.04);}
  .card-front::after{content:'🪿';font-size:28px}
  .card.matched .card-back{background:linear-gradient(135deg,#a5d6a7,#66bb6a);box-shadow:0 4px 12px rgba(102,187,106,0.4);animation:matchPop 0.3s ease}
  @keyframes matchPop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.15)}100%{transform:rotateY(180deg) scale(1)}}
  #overlay{position:fixed;inset:0;background:rgba(224,247,250,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:100}
  #overlay.hidden{display:none}
  .ov-goose{font-size:72px;animation:honkdance 0.6s ease-in-out infinite alternate}
  @keyframes honkdance{from{transform:translateY(0) rotate(-8deg)}to{transform:translateY(-10px) rotate(8deg)}}
  .ov-title{font-family:'Paytone One',cursive;font-size:42px;color:#00695c}
  .ov-sub{font-size:12px;color:#80cbc4;letter-spacing:2px;margin-bottom:8px}
  .ov-result{font-family:'Paytone One',cursive;font-size:56px;color:#ff7043;display:none}
  .ov-result-sub{font-size:13px;color:#888;display:none;margin-bottom:12px}
  .btn{background:#00695c;color:#fff;font-family:'Paytone One',cursive;font-size:18px;padding:14px 40px;border-radius:999px;border:none;cursor:pointer;box-shadow:0 5px 0 #004d40;transition:transform .1s;letter-spacing:1px}
  .btn:hover{transform:translateY(-2px)}
  #diff-row{display:flex;gap:10px;margin-bottom:4px}
  .diff-btn{background:rgba(0,105,92,0.1);border:2px solid rgba(0,105,92,0.3);border-radius:20px;padding:6px 16px;font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;color:#00695c;cursor:pointer;transition:all .2s}
  .diff-btn.active,.diff-btn:hover{background:#00695c;color:#fff;border-color:#00695c}
  #honk-msg{font-family:'Paytone One',cursive;font-size:18px;color:#ff7043;height:24px;transition:opacity .3s}
</style>
</head>
<body>
<a href="../index.html" id="back-btn" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;padding:7px 14px 7px 10px;border-radius:8px;font-size:12px;font-family:system-ui,sans-serif;font-weight:600;letter-spacing:.3px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;gap:6px;transition:background .15s,transform .15s;" onmouseover="this.style.background='rgba(0,0,0,0.82)';this.style.transform='translateY(-1px)'" onmouseout="this.style.background='rgba(0,0,0,0.55)';this.style.transform=''">🪿 Games</a>
<div id="overlay">
  <div class="ov-goose">🪿</div>
  <div class="ov-title">GOOSE MEMORY</div>
  <div class="ov-sub">Match all the geese. Don't lose your mind.</div>
  <div id="diff-row">
    <button class="diff-btn active" onclick="setDiff(4,4,this)">Easy (4×4)</button>
    <button class="diff-btn" onclick="setDiff(4,5,this)">Hard (4×5)</button>
  </div>
  <div class="ov-result" id="ov-result"></div>
  <div class="ov-result-sub" id="ov-result-sub"></div>
  <button class="btn" onclick="startGame()">START MATCHING</button>
</div>

<div id="app">
  <h1>🪿 GOOSE MEMORY<small>how good is your goose brain?</small></h1>
  <div id="stats">
    <div class="stat"><div class="stat-l">Moves</div><div class="stat-v" id="moves">0</div></div>
    <div class="stat"><div class="stat-l">Time</div><div class="stat-v time" id="timer">0s</div></div>
    <div class="stat"><div class="stat-l">Pairs</div><div class="stat-v" id="pairs">0</div></div>
    <div class="stat"><div class="stat-l">Best</div><div class="stat-v" id="best">-</div></div>
  </div>
  <div id="honk-msg"></div>
  <div id="board"></div>
</div>

<script>
const SYMBOLS=['🪿','🥚','🍞','🌊','🦆','🐣','🌿','💧','🏊','🐟','🌸','🦋','🌻','🏞️','🌾','🍃'];
const HONK_MSGS=['HONK!','NICE ONE!','GOOSE BRAIN!','YES!','MATCHED!','HONK HONK!','🪿🪿'];

let cols,rows,cards,flipped,matched,moves,timerVal,timerInt,lockBoard;
cols=4;rows=4;

function loadBest(){
  const key=`${cols}x${rows}`;
  return localStorage.getItem(`goose_memory_best_${key}`)||'-';
}
document.getElementById('best').textContent=loadBest();

function setDiff(c,r,btn){
  cols=c;rows=r;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('best').textContent=loadBest();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  const total=cols*rows;
  const syms=shuffle([...SYMBOLS]).slice(0,total/2);
  const deck=shuffle([...syms,...syms]);
  cards=deck;flipped=[];matched=0;moves=0;lockBoard=false;timerVal=0;
  clearInterval(timerInt);timerInt=setInterval(()=>{timerVal++;document.getElementById('timer').textContent=timerVal+'s';},1000);
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('timer').textContent='0s';
  renderBoard();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},80px)`;
  board.innerHTML='';
  cards.forEach((sym,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.index=i;
    card.dataset.sym=sym;
    card.innerHTML=`<div class="card-inner"><div class="card-front"></div><div class="card-back">${sym}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    board.appendChild(card);
  });
}

function flipCard(card){
  if(lockBoard||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    lockBoard=true;
    setTimeout(checkMatch,700);
  }
}

function checkMatch(){
  const[a,b]=flipped;
  if(a.dataset.sym===b.dataset.sym){
    a.classList.add('matched');b.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent=matched;
    showHonk();
    if(matched===cards.length/2){setTimeout(winGame,400);}
  } else {
    a.classList.remove('flipped');b.classList.remove('flipped');
  }
  flipped=[];lockBoard=false;
}

function showHonk(){
  const el=document.getElementById('honk-msg');
  el.textContent=HONK_MSGS[Math.floor(Math.random()*HONK_MSGS.length)];
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,800);
}

function winGame(){
  clearInterval(timerInt);
  const key=`${cols}x${rows}`;
  const prev=localStorage.getItem(`goose_memory_best_${key}`);
  const bScore=`${moves}m/${timerVal}s`;
  const prevMoves=prev?parseInt(prev.split('m')[0]):Infinity;
  const prevTime=prev?parseInt(prev.split('/')[1]):Infinity;
  if(!prev||moves<prevMoves||(moves===prevMoves&&timerVal<prevTime)){
    localStorage.setItem(`goose_memory_best_${key}`,bScore);
    document.getElementById('best').textContent=bScore;
  }
  const ov=document.getElementById('overlay');
  document.getElementById('ov-result').style.display='block';
  document.getElementById('ov-result-sub').style.display='block';
  document.getElementById('ov-result').textContent=timerVal+'s';
  document.getElementById('ov-result-sub').textContent=`${moves} moves · ${cols}×${rows} grid · THE POND IS YOURS 🪿`;
  ov.classList.remove('hidden');
}
</script>
</body>
</html>
