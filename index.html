<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goose Games — Free HTML5 Arcade</title>
  <meta name="description" content="8 free browser games starring geese. No download, no account. Just honk.">
  <meta name="keywords" content="free online games, browser games, html5 games, goose games, arcade games">
  <meta property="og:title" content="Goose Games — Free HTML5 Arcade">
  <meta property="og:description" content="8 free browser games starring geese. No download, no account. Just honk.">
  <meta property="og:url" content="https://playgoosegames.io">
  <link rel="canonical" href="https://playgoosegames.io/">
  <link rel="stylesheet" href="styles.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C5Q5ZQ2DBZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C5Q5ZQ2DBZ');
  </script>
</head>
<body>

<header>
  <a href="/" class="logo">
    <span class="logo-icon">🪿</span>
    Goose Games
  </a>
  <nav>
    <a href="/">Games</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="hero-badge">🪿 8 games · Free · No account needed</div>
    <h1>Free Goose Games.<br><span>Play Instantly.</span></h1>
    <p>Browser arcade games starring geese — no downloads, no sign-up, no nonsense. Just honk.</p>
  </section>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All Games</button>
    <button class="filter-btn" data-filter="arcade">Arcade</button>
    <button class="filter-btn" data-filter="puzzle">Puzzle</button>
  </div>

  <section class="games-section">
    <div class="games-grid" id="games-grid">
      <!-- Cards injected by JS -->
    </div>
  </section>
</main>

<footer>
  <div class="footer-links">
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-of-service.html">Terms of Service</a>
  </div>
  <p>© 2025 Goose Games · <a href="https://playgoosegames.io">playgoosegames.io</a></p>
</footer>

<script>
  // Render game cards from games.json
  fetch('games.json')
    .then(r => r.json())
    .then(games => {
      const grid = document.getElementById('games-grid');
      grid.innerHTML = games.map(game => `
        <a href="games/${game.filename}" class="game-card" data-category="${game.category}">
          <div class="card-emoji-thumb">
            <span>${game.emoji}</span>
          </div>
          <div class="card-body">
            <div class="card-category">${game.category}</div>
            <div class="card-title">${game.title}</div>
            <div class="card-desc">${game.description}</div>
          </div>
        </a>
      `).join('');

      // Wire up filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.dataset.filter;
          document.querySelectorAll('.game-card').forEach(card => {
            card.classList.toggle('hidden', filter !== 'all' && card.dataset.category !== filter);
          });
        });
      });
    })
    .catch(() => {
      document.getElementById('games-grid').innerHTML =
        '<p style="color:var(--muted);padding:24px">Could not load games. Try refreshing.</p>';
    });
</script>
</body>
</html>
